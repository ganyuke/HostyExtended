app-id: io.github.sugarycandybar.Hosty
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: hosty
finish-args:
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - python3-requirements.json
  - name: hosty
    buildsystem: meson
    sources:
      - type: dir
        path: ../../

name: Release Artifacts

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows GTK App
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 GTK environment
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            zip
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-pyinstaller
            mingw-w64-ucrt-x86_64-python-requests
            mingw-w64-ucrt-x86_64-python-psutil
            mingw-w64-ucrt-x86_64-python-pillow
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-adwaita-icon-theme
            mingw-w64-ucrt-x86_64-gsettings-desktop-schemas

      - name: Read app version
        id: version
        shell: msys2 {0}
        run: |
          VERSION=$(python -c "import ast; from pathlib import Path; tree = ast.parse(Path('hosty/version.py').read_text(encoding='utf-8')); print(next((node.value.value for node in tree.body if isinstance(node, ast.Assign) for target in node.targets if isinstance(target, ast.Name) and target.id == '__version__' and isinstance(node.value, ast.Constant) and isinstance(node.value.value, str)), ''))")
          if [ -z "$VERSION" ]; then
            echo "__version__ not found" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release tag matches app version
        if: github.event_name == 'release'
        shell: msys2 {0}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${{ steps.version.outputs.version }}"

          normalize_version() {
            value="$1"
            value="${value#v}"
            value="${value#V}"
            if [[ "$value" =~ ^[0-9]+\.[0-9]+$ ]]; then
              echo "$value.0"
              return 0
            fi
            if [[ "$value" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "$value"
              return 0
            fi
            return 1
          }

          if ! NORMALIZED_TAG="$(normalize_version "$TAG")" || ! NORMALIZED_VERSION="$(normalize_version "$VERSION")" || [ "$NORMALIZED_TAG" != "$NORMALIZED_VERSION" ]; then
            echo "Release tag '$TAG' does not match app version '$VERSION'" >&2
            exit 1
          fi

      - name: Build portable GTK app
        shell: msys2 {0}
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --onedir \
            --windowed \
            --name Hosty \
            --collect-submodules gi \
            --collect-submodules hosty \
            --add-binary "/ucrt64/bin/libgtk-4-1.dll;." \
            --add-binary "/ucrt64/bin/libadwaita-1-0.dll;." \
            --add-data "/ucrt64/lib/girepository-1.0;lib/girepository-1.0" \
            --add-data "/ucrt64/share/glib-2.0/schemas;share/glib-2.0/schemas" \
            --add-data "/ucrt64/share/icons;share/icons" \
            hosty.py

      - name: Zip portable app
        shell: msys2 {0}
        run: |
          cd dist
          zip -r "Hosty-${{ steps.version.outputs.version }}-windows-x86_64.zip" Hosty

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hosty-windows-${{ steps.version.outputs.version }}
          path: dist/Hosty-${{ steps.version.outputs.version }}-windows-x86_64.zip

  build-linux-flatpak:
    name: Build Linux Flatpak
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(python3 -c "import re; from pathlib import Path; text = Path('hosty/version.py').read_text(encoding='utf-8'); match = re.search(r'^__version__\\s*=\\s*\"([^\"]+)\"', text, re.MULTILINE); print(match.group(1) if match else '')")
          if [ -z "$VERSION" ]; then
            echo "__version__ not found" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release tag matches app version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${{ steps.version.outputs.version }}"

          normalize_version() {
            value="$1"
            value="${value#v}"
            value="${value#V}"
            if [[ "$value" =~ ^[0-9]+\.[0-9]+$ ]]; then
              echo "$value.0"
              return 0
            fi
            if [[ "$value" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "$value"
              return 0
            fi
            return 1
          }

          if ! NORMALIZED_TAG="$(normalize_version "$TAG")" || ! NORMALIZED_VERSION="$(normalize_version "$VERSION")" || [ "$NORMALIZED_TAG" != "$NORMALIZED_VERSION" ]; then
            echo "Release tag '$TAG' does not match app version '$VERSION'" >&2
            exit 1
          fi

      - name: Install Flatpak tooling and GNOME SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          # Install GNOME SDK and Platform 50 required by the manifest
          flatpak --user install -y flathub org.gnome.Platform//50 org.gnome.Sdk//50

      - name: Cache Flatpak downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/flatpak
            ~/.var/app
          key: ${{ runner.os }}-flatpak-sdk-50-${{ hashFiles('packaging/flatpak/**') }}
          restore-keys: |
            ${{ runner.os }}-flatpak-sdk-50-

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --user --force-clean --default-branch=stable --repo=repo build-dir packaging/flatpak/io.github.sugarycandybar.Hosty.yml
          flatpak build-bundle --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo repo "Hosty-${{ steps.version.outputs.version }}-x86_64.flatpak" io.github.sugarycandybar.Hosty stable --arch=x86_64

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: hosty-linux-flatpak
          path: ./*.flatpak

  upload-release-assets:
    name: Upload assets to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-exe
      - build-linux-flatpak
    if: github.event_name == 'release'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
            release-assets/**/*.flatpak

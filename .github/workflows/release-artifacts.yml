name: Release Artifacts

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows GTK App
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 GTK environment
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            zip
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-pip
            mingw-w64-ucrt-x86_64-python-requests
            mingw-w64-ucrt-x86_64-python-psutil
            mingw-w64-ucrt-x86_64-python-pillow
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-gdk-pixbuf2
            mingw-w64-ucrt-x86_64-librsvg
            mingw-w64-ucrt-x86_64-webp-pixbuf-loader
            mingw-w64-ucrt-x86_64-adwaita-icon-theme
            mingw-w64-ucrt-x86_64-gsettings-desktop-schemas

      - name: Install PyInstaller
        shell: msys2 {0}
        run: |
          python -m pip install --upgrade pyinstaller

      - name: Read app version
        id: version
        shell: msys2 {0}
        run: |
          VERSION=$(python -c "import ast; from pathlib import Path; tree = ast.parse(Path('hosty/version.py').read_text(encoding='utf-8')); print(next((node.value.value for node in tree.body if isinstance(node, ast.Assign) for target in node.targets if isinstance(target, ast.Name) and target.id == '__version__' and isinstance(node.value, ast.Constant) and isinstance(node.value.value, str)), ''))")
          if [ -z "$VERSION" ]; then
            echo "__version__ not found" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release tag matches app version
        if: github.event_name == 'release'
        shell: msys2 {0}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${{ steps.version.outputs.version }}"

          normalize_version() {
            value="$1"
            value="${value#v}"
            value="${value#V}"
            if [[ "$value" =~ ^[0-9]+\.[0-9]+$ ]]; then
              echo "$value.0"
              return 0
            fi
            if [[ "$value" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "$value"
              return 0
            fi
            return 1
          }

          if ! NORMALIZED_TAG="$(normalize_version "$TAG")" || ! NORMALIZED_VERSION="$(normalize_version "$VERSION")" || [ "$NORMALIZED_TAG" != "$NORMALIZED_VERSION" ]; then
            echo "Release tag '$TAG' does not match app version '$VERSION'" >&2
            exit 1
          fi

      - name: Build portable GTK app
        shell: msys2 {0}
        run: |
          GI_TYPELIBS="$(cygpath -w /ucrt64/lib/girepository-1.0)"
          GLIB_SCHEMAS="$(cygpath -w /ucrt64/share/glib-2.0/schemas)"
          ICONS="$(cygpath -w /ucrt64/share/icons)"
          PIXBUF_LOADERS="$(cygpath -w /ucrt64/lib/gdk-pixbuf-2.0)"
          APP_ICONS="$(cygpath -w packaging/linux)"

          mkdir -p build
          rsvg-convert -w 256 -h 256 packaging/linux/io.github.sugarycandybar.Hosty.svg -o build/Hosty.png
          python - <<'PY'
          from PIL import Image
          img = Image.open("build/Hosty.png")
          img.save("build/Hosty.ico", sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])
          PY

          pyinstaller \
            --noconfirm \
            --clean \
            --onedir \
            --windowed \
            --name Hosty \
            --icon build/Hosty.ico \
            --collect-submodules gi \
            --collect-submodules hosty \
            --add-data "$GI_TYPELIBS;lib/girepository-1.0" \
            --add-data "$GLIB_SCHEMAS;share/glib-2.0/schemas" \
            --add-data "$ICONS;share/icons" \
            --add-data "$PIXBUF_LOADERS;lib/gdk-pixbuf-2.0" \
            --add-data "$APP_ICONS;icons" \
            hosty.py

          BUNDLE_PIXBUF_LOADERS="$(cygpath -w "$(pwd)/dist/Hosty/lib/gdk-pixbuf-2.0/2.10.0/loaders")"
          GDK_PIXBUF_MODULEDIR="$BUNDLE_PIXBUF_LOADERS" gdk-pixbuf-query-loaders > "dist/Hosty/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache"

      - name: Zip portable app
        shell: msys2 {0}
        run: |
          cd dist
          zip -r "Hosty-${{ steps.version.outputs.version }}-windows-x86_64.zip" Hosty

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hosty-windows-${{ steps.version.outputs.version }}
          path: dist/Hosty-${{ steps.version.outputs.version }}-windows-x86_64.zip


  upload-release-assets:
    name: Upload assets to GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows-exe
    if: github.event_name == 'release'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
